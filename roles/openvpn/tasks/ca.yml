- name: remove existing CA
  file:
    path: "{{ openvpn_ca_folder }}"
    state: absent
  when: openvpn_ca_force_recreation

- name: configure CA
  template:
    dest: "{{ easyrsa_folder }}/vars"
    src: "easyrsa/vars"

- name: initialize CA
  command:
    cmd: "{{ easyrsa_exe }} init-pki"
    creates: "{{ openvpn_ca_folder }}"

- name: build CA
  expect:
    command: "{{ easyrsa_exe }} build-ca"
    creates: "{{ openvpn_ca_root_certificate }}"
    responses:
      'Enter New CA Key Passphrase:': "{{ openvpn.ca_passphrase }}"
      'Re-Enter .*': "{{ openvpn.ca_passphrase }}"
      'Common Name .*': "{{ openvpn_server_name }}"

- name: generate Diffie Hellman key
  command:
    cmd: "{{ easyrsa_exe }} gen-dh"
    creates: "{{ openvpn_ca_folder }}/dh.pem"

- name: generate revocation list
  expect:
    command: "{{ easyrsa_exe }} gen-crl"
    creates: "{{ openvpn_ca_folder }}/crl.pem"
    responses:
      'Enter pass.*': "{{ openvpn.ca_passphrase }}"

- name: generate shared TLS authentication key
  command:
    cmd: "openvpn --genkey --secret {{ openvpn_server_tls_auth_key }}"
    creates: "{{ openvpn_server_tls_auth_key }}"

- name: create and deploy server certificate
  include_tasks: server.yml

- name: create and deploy client certificates
  include_tasks: client.yml
  loop: "{{ users }}"
  loop_control:
    loop_var: openvpn_client
