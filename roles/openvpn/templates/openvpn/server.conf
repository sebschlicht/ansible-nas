# Logging
log-append /var/log/openvpn.log
status /var/log/openvpn-status.log 20
status-version 3
verb 3

# Connection
port {{ openvpn_port }}
proto udp
dev tun
keepalive 1800 3600
float

# Certificates and Keys
ca {{ openvpn_server_folder }}/ca.crt
dh {{ openvpn_server_folder }}/dh.pem
tls-auth {{ openvpn_server_folder }}/ta.key 0
cert {{ openvpn_server_folder }}/{{ openvpn_server_name }}.crt
key {{ openvpn_server_folder }}/{{ openvpn_server_name }}.key

# Networking
server 10.8.0.0 255.255.255.0
topology subnet
push "route 192.168.1.0 255.255.255.0"
push "block-outside-dns"

# Security
opt-verify
tls-server
cipher AES-256-GCM
ncp-disable
tls-version-min 1.2
tls-cipher TLS-ECDHE-ECDSA-WITH-CHACHA20-POLY1305-SHA256:TLS-ECDHE-RSA-WITH-CHACHA20-POLY1305-SHA256:TLS-ECDHE-ECDSA-WITH-AES-256-GCM-SHA256:TLS-ECDHE-RSA-WITH-AES-256-GCM-SHA256
ecdh-curve secp384r1
auth SHA512
auth-nocache
remote-cert-tls client
verify-client-cert require
tls-cert-profile preferred

# Permissions
daemon
user openvpn
group openvpn

# Jail
chroot {{ openvpn_server_jail }}
crl-verify crl.pem

# Misc
# duplicate-cn
persist-key
persist-tun
