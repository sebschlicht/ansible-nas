client
dev tun
proto udp

remote {{ openvpn_server_name }} {{ openvpn_port }}

ca ca.crt
cert {{ openvpn_client.name }}.crt
key {{ openvpn_client.name }}.key

cipher AES-256-CBC
auth SHA512
auth-nocache
tls-version-min 1.2
tls-cipher TLS-ECDHE-ECDSA-WITH-AES-256-GCM-SHA384:TLS-ECDHE-ECDSA-WITH-AES-256-CBC-SHA384

resolv-retry infinite
compress lz4
nobind
persist-key
persist-tun
mute-replay-warnings
verb 3
