client
dev tun
proto udp

remote {{ openvpn_server_name }} {{ openvpn_port }}

ca ca.crt
tls-auth ta.key 1
cert {{ openvpn_client.name }}.crt
key {{ openvpn_client.name }}.key

tls-client
cipher AES-256-GCM
auth SHA512
auth-nocache
tls-version-min 1.2
tls-cipher TLS-ECDHE-ECDSA-WITH-CHACHA20-POLY1305-SHA256:TLS-ECDHE-RSA-WITH-CHACHA20-POLY1305-SHA256:TLS-ECDHE-ECDSA-WITH-AES-256-GCM-SHA256:TLS-ECDHE-RSA-WITH-AES-256-GCM-SHA256
tls-cert-profile preferred

resolv-retry infinite
nobind
persist-key
persist-tun
mute-replay-warnings
verb 3
